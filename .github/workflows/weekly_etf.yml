name: Weekly ETF (repo-B, 목요일, etfpy)

on:
  schedule:
    - cron: '30 21 * * 3'      # UTC 21:30 수요일 = KST 06:30 목요일 (지연 포함 ~07:00)
  workflow_dispatch:

jobs:
  run:
    if: github.repository_owner == 'Msqqp2'
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Check US market holiday
        id: holiday_check
        run: python -m pipeline.utils.us_market_calendar

      - name: Run ETF sync
        id: sync_run
        if: steps.holiday_check.outputs.is_trading_day == 'true'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: python -m pipeline.etf_sync

      - name: Skip message
        if: steps.holiday_check.outputs.is_trading_day == 'false'
        run: echo "US market holiday — skipping ETF sync."

      - name: Send failure email
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_HOST }}
          server_port: ${{ secrets.SMTP_PORT }}
          secure: true
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "ETF (etfpy) batch FAILED — ${{ github.run_id }}"
          to: ${{ secrets.EMAIL_TO }}
          from: Stock Screener Bot <${{ secrets.SMTP_USERNAME }}>
          body: |
            ETF (etfpy) batch failure alert

            Workflow: ${{ github.workflow }}
            Run ID: ${{ github.run_id }}

            Logs: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

name: Weekly Finnhub ETF (repo-B, 목요일)

on:
  schedule:
    - cron: '30 22 * * 3'      # UTC 22:30 수요일 = KST 07:30 목요일
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Run ETF sync
        id: sync_run
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: python -m pipeline.etf_sync

      - name: Send failure email
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_HOST }}
          server_port: ${{ secrets.SMTP_PORT }}
          secure: true
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "Finnhub ETF batch FAILED — ${{ github.run_id }}"
          to: ${{ secrets.EMAIL_TO }}
          from: Stock Screener Bot <${{ secrets.SMTP_USERNAME }}>
          body: |
            Finnhub ETF batch failure alert

            Workflow: ${{ github.workflow }}
            Run ID: ${{ github.run_id }}

            Logs: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

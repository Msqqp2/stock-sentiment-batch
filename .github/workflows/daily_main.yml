name: Daily Main Batch (repo-A)

on:
  schedule:
    - cron: '0 22 * * *'       # UTC 22:00 = KST 07:00
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 240        # 월요일 Info 실행 시 ~219분

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Check US market holiday
        id: holiday_check
        run: python -m pipeline.utils.us_market_calendar

      - name: Run sync pipeline
        id: sync_run
        if: steps.holiday_check.outputs.is_trading_day == 'true'
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python -m pipeline.daily_sync

      - name: Skip message
        if: steps.holiday_check.outputs.is_trading_day == 'false'
        run: echo "US market holiday — skipping today's batch."

      - name: Send completion email
        if: steps.sync_run.outcome == 'success'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_HOST }}
          server_port: ${{ secrets.SMTP_PORT }}
          secure: true
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "Stock Screener batch completed — ${{ github.run_id }}"
          to: ${{ secrets.EMAIL_TO }}
          from: Stock Screener Bot <${{ secrets.SMTP_USERNAME }}>
          body: |
            Daily batch pipeline completed successfully.

            Workflow: ${{ github.workflow }}
            Run ID: ${{ github.run_id }}
            Time (UTC): ${{ github.event.head_commit.timestamp || 'scheduled' }}

            Logs: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Send failure email
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_HOST }}
          server_port: ${{ secrets.SMTP_PORT }}
          secure: true
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "Stock Screener batch FAILED — ${{ github.run_id }}"
          to: ${{ secrets.EMAIL_TO }}
          from: Stock Screener Bot <${{ secrets.SMTP_USERNAME }}>
          body: |
            Batch pipeline failure alert

            Workflow: ${{ github.workflow }}
            Run ID: ${{ github.run_id }}
            Time (UTC): ${{ github.event.head_commit.timestamp || 'scheduled' }}

            Logs: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
